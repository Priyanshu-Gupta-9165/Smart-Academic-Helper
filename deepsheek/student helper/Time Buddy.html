<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner 📚</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .timer-section, .timetable-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .timer-display {
            font-size: 3rem;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
        }

        .secondary-btn {
            background: var(--secondary);
            color: white;
        }

        .timetable-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select, .add-btn {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            cursor: pointer;
        }

        .timetable {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .timetable-item {
            padding: 15px;
            background: #f8f8f8;
            border-radius: 5px;
            position: relative;
        }

        @media (max-width: 768px) {
            .timer-display {
                font-size: 2rem;
            }
            
            .timetable-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Study Planner</h1>
        
        <div class="timer-section">
            <h2>⏳ Study Timer</h2>
            <div class="timer-display" id="timer">25:00</div>
            <div class="controls">
                <button class="primary-btn" onclick="startTimer()">Start</button>
                <button class="secondary-btn" onclick="pauseTimer()">Pause</button>
                <button class="secondary-btn" onclick="resetTimer()">Reset</button>
                <input type="number" id="customTime" placeholder="Minutes" min="1" style="width: 100px;">
            </div>
        </div>

        <div class="timetable-section">
            <h2>📅 Create Timetable</h2>
            <div class="timetable-form">
                <input type="text" id="subject" placeholder="Subject">
                <input type="time" id="time">
                <select id="day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
                <button class="add-btn" onclick="addToTimetable()">Add Entry</button>
            </div>
            <div class="timetable" id="timetable"></div>
        </div>

        <audio id="alarm" src="data:audio/mpeg;base64,//uQFAAAAAAA..."></audio>
    </div>

    <script>
        let timeLeft = 1500; // 25 minutes in seconds
        let timerId = null;
        const timerDisplay = document.getElementById('timer');
        const alarm = document.getElementById('alarm');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startTimer() {
            const customTime = document.getElementById('customTime').value;
            if (customTime) {
                timeLeft = customTime * 60;
                document.getElementById('customTime').value = '';
            }
            
            if (!timerId) {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alarm.play();
                        timerId = null;
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 1500;
            updateDisplay();
        }

        function addToTimetable() {
            const subject = document.getElementById('subject');
            const time = document.getElementById('time');
            const day = document.getElementById('day');

            const entry = document.createElement('div');
            entry.className = 'timetable-item';
            entry.innerHTML = `
                <strong>${day.value}</strong><br>
                ${subject.value}<br>
                ${time.value}
            `;

            document.getElementById('timetable').appendChild(entry);
            
            // Clear inputs
            subject.value = '';
            time.value = '';
            day.value = 'Monday';
        }

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
