<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner 📚</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f0f7ff;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .task-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .task-list {
            margin-top: 20px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .task-item:hover {
            transform: translateX(5px);
        }

        .progress-bar {
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #4CAF50;
            transition: width 0.5s ease;
        }

        .completed {
            background: #d4edda;
            opacity: 0.7;
        }

        .overdue {
            background: #ffe6e6;
            border-left: 4px solid #ff4444;
        }

       </style>
</head>
<body>
    <div class="container">
        <h1>📚 Study Planner</h1>
        
        <form class="task-form" id="taskForm">
            <input type="text" id="taskName" placeholder="Task name" required>
            <input type="datetime-local" id="dueDate" required>
            <select id="priority">
                <option value="low">Low Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <button type="submit">Add Task</button>
        </form>

        <div class="progress-bar">
            <div class="progress" id="progress" style="width: 0%"></div>
        </div>

        <div class="task-list" id="taskList"></div>

        
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateProgress();
        }

        function updateProgress() {
            const completed = tasks.filter(task => task.completed).length;
            const progress = (completed / tasks.length) * 100 || 0;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function createTaskElement(task) {
            const taskEl = document.createElement('div');
            taskEl.className = `task-item ${task.completed ? 'completed' : ''} ${isOverdue(task.dueDate) ? 'overdue' : ''}`;
            taskEl.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')">
                <div style="flex-grow: 1; margin: 0 15px;">
                    <h3 style="margin: 0">${task.name}</h3>
                    <p style="margin: 5px 0">Due: ${new Date(task.dueDate).toLocaleString()}</p>
                    <small>Priority: ${task.priority}</small>
                </div>
                <button onclick="deleteTask('${task.id}')">🗑️</button>
            `;
            return taskEl;
        }

        function isOverdue(dueDate) {
            return new Date(dueDate) < new Date() && !tasks.find(task => task.dueDate === dueDate)?.completed;
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';
            tasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).forEach(task => {
                taskList.appendChild(createTaskElement(task));
            });
            checkReminders();
        }

        function checkReminders() {
            tasks.forEach(task => {
                if (!task.completed) {
                    const timeLeft = new Date(task.dueDate) - new Date();
                    if (timeLeft > 0 && timeLeft < 3600000) { // 1 hour reminder
                        alert(`⏰ Reminder: "${task.name}" is due in less than 1 hour!`);
                    }
                }
            });
        }

        function addTask(event) {
            event.preventDefault();
            const task = {
                id: Date.now().toString(),
                name: document.getElementById('taskName').value,
                dueDate: document.getElementById('dueDate').value,
                priority: document.getElementById('priority').value,
                completed: false
            };
            tasks.push(task);
            saveTasks();
            renderTasks();
            taskForm.reset();
        }

        function toggleTask(id) {
            tasks = tasks.map(task => 
                task.id === id ? {...task, completed: !task.completed} : task
            );
            saveTasks();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            renderTasks();
        }


        // Initial setup
        document.getElementById('taskForm').addEventListener('submit', addTask);
        setInterval(checkReminders, 60000); // Check every minute
        renderTasks();
    </script>
</body>
</html>
